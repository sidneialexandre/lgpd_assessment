<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação de Conformidade LGPD</title>
    <script>
        // Estratégia de SPA Redirect para GitHub Pages
        // Quando GitHub Pages não encontra uma rota, ele carrega 404.html
        // Este script redireciona para index.html preservando a rota original
        
        (function() {
            // Obter a rota que o usuário tentou acessar
            var redirect = sessionStorage.redirect;
            delete sessionStorage.redirect;
            
            if (redirect && redirect !== location.href) {
                history.replaceState(null, null, redirect);
            }
        })();
    </script>
</head>
<body>
    <script>
        // Redirecionar para a página principal
        window.location.href = '/';
    </script>
</body>
</html>
